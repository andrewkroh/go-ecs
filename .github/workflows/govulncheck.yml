---

name: govulncheck
on:
  pull_request:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: stable

      - name: Run govulncheck (generator)
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: stable
          work-dir: ./internal/generator
